services:
  db:
    image: postgres:18-alpine
    container_name: psicologia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: psicologia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - psicologia_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d psicologia"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: psicologia_api
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: dev-docker-change-in-production-use-a-long-random-secret-key
      DJANGO_DEBUG: "True"
      DB_ENGINE: postgres
      POSTGRES_DB: psicologia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PORT: 8080
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,api
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:8001,http://localhost:4200,http://localhost:4201,http://127.0.0.1:4201
      ADMIN_EMAIL: ficho@cue.edu.co
      ADMIN_PASSWORD: admin123
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-45}
    ports:
      - "8001:8080"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend-estudiante:
    build:
      context: ./frontend-estudiante-angular/app
    container_name: psicologia_frontend_estudiante
    restart: unless-stopped
    environment:
      PORT: 8080
      API_UPSTREAM: http://api:8080
    ports:
      - "4200:8080"
    depends_on:
      - api

volumes:
  psicologia_postgres_data:
